default: &default
  dispatchers:
    - polling_interval: 1
      batch_size: 500
  workers:
    - queues: [realtime, default]
      threads: 2
      processes: <%= ENV.fetch("JOB_CONCURRENCY", 2) %>
      polling_interval: 0.1
    - queues: [background, ahoy, meilisearch, active_storage, solid_queue_recurring, uptime]
      threads: 4
      processes: <%= ENV.fetch("JOB_CONCURRENCY", 2) %>
    - queues: [heavy]
      threads: 4
      processes: <%= ENV.fetch("JOB_CONCURRENCY", 2) %>
development:
  <<: *default

test:
  <<: *default

production:
  <<: *default
