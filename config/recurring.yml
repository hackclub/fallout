#     args: [ 1000, { batch_size: 500 } ]
#     schedule: every hour
#   periodic_cleanup_with_command:
#     command: "SoftDeletedRecord.due.delete_all"
#     priority: 2
#     schedule: at 5am every day

production:
  clear_solid_queue_finished_jobs:
    command: 'SolidQueue::Job.clear_finished_in_batches(sleep_between_batches: 0.3)'
    schedule: every hour at minute 12

  uptime_ping:
    class: UptimePingJob
    queue: uptime
    schedule: every minute

  uptime_ping_heavy:
    class: UptimePingHeavyJob
    queue: heavy
    schedule: every minute

  airtable_sync:
    class: AirtableSyncJob
    queue: background
    schedule: every 5 minutes

  expire_stale_review_claims:
    class: ExpireStaleReviewClaimsJob
    queue: background
    schedule: every 10 minutes

  hcb_token_refresh:
    class: HcbTokenRefreshJob
    queue: background
    schedule: every hour

  hcb_grant_card_sync:
    class: HcbGrantCardSyncJob
    queue: background
    schedule: every 15 minutes

  streak_reconciliation:
    class: StreakReconciliationJob
    queue: background
    schedule: every 30 minutes

  streak_notifications:
    class: StreakNotificationJob
    queue: background
    schedule: every hour at minute 30

  streak_leaderboard:
    class: StreakLeaderboardJob
    queue: background
    schedule: every day at 5pm # Noon ET (UTC-5 standard / UTC-4 daylight — using standard)

  project_inactivity:
    class: ProjectInactivityJob
    queue: background
    schedule: every day at 9am

  user_ban_check:
    class: UserBanCheckJob
    queue: background
    schedule: every 30 minutes

  hca_identity_refresh:
    class: HcaIdentityRefreshJob
    queue: background
    schedule: every 10 minutes
