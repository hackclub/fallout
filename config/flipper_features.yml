shared:
  shop: Koi shop where users can spend koi on items and experiences
  collaborators: Allow users to add collaborators to their projects
  grant_fulfillment: User-facing project-funding requests and the admin approval/HCB topup flow
  hcb_top_ups: User-funded top-ups via HCB donations onto the user's grant card
  disable_new_submissions: Block submitting projects that have never been shipped before (resubmissions of already-shipped projects still allowed)
  new_submissions_override: Per-user override allowing first-time project submissions even while disable_new_submissions is on
  limit_reships: Cap each project at one reship on/after June 21 00:00 EDT — applies to the reship button and resubmitting a returned ship (first-time submissions excluded)
  reship_limit_override: Per-user override exempting a user from the limit_reships one-reship cap

