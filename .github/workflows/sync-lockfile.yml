name: Sync Lockfile

on:
  pull_request:
    paths:
      - 'package.json'
      - 'package-lock.json'

permissions:
  contents: write

jobs:
  sync:
    # Skip forks — GITHUB_TOKEN can't push back to a fork's branch.
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.head_ref }}

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: lts/*
          cache: npm

      - name: Regenerate lockfile on linux
        run: npm install --package-lock-only --include=optional --no-audit --no-fund

      - name: Commit and push if changed
        run: |
          if git diff --quiet package-lock.json; then
            echo "::notice::Lockfile already in sync"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package-lock.json
          git commit -m "ci: sync package-lock.json across platforms"
          git push
          echo "::notice::Lockfile auto-synced and pushed"
